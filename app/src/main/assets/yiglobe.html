<body>
<canvas id="c"></canvas>
<div id="labels"></div>
<button id="hudToggle" title="展开控制面板" style="display:none">易</button>
<div id="hud">
  <div class="hud-head"><h1>八卦星云图</h1><button class="hud-close" type="button" title="收起面板">—</button></div>
  <div class="sub">Yi-globe · 依 Drasny 构造法</div>
  <div>两极: 乾☰☰(北) / 坤☷☷(南)</div>
  <div>五纬: ±60° ±30° 0° (按阳爻数)</div>
  <div>十二经: 按爻位循环均值</div>
  <div>中轴: 坎离震艮巽兑 + 既未济</div>
  <hr style="border-color:#2a2f45">
  <label><input type="checkbox" id="tgGrid" checked>经纬球面</label>
  <label><input type="checkbox" id="tgLines" checked>变爻连线</label>
  <label><input type="checkbox" id="tgNames" checked>卦名</label>
  <label><input type="checkbox" id="tgFront">仅显示主视图卦象（无景深）</label>
  <label><input type="checkbox" id="tgAuto">自转</label>
  <label><input type="checkbox" id="tg12" checked>十二消息卦(月令)</label>
  <hr style="border-color:#2a2f45">
  <div class="sub" style="margin:4px 0">运动模式</div>
  <label><input type="radio" name="motion" value="off" checked>静止</label>
  <label><input type="radio" name="motion" value="year">年轮(月令循环)</label>
  <label><input type="radio" name="motion" value="yao">爻变脉冲</label>
  <label><input type="radio" name="motion" value="orbit">层级公转</label>
  <label><input type="radio" name="motion" value="enlighten">登天螺旋(54卦)</label>
  <label><input type="radio" name="motion" value="helix">升龙螺旋(均匀)</label>
  <label><input type="radio" name="motion" value="flow">爻变总流(全局)</label>
  <div class="sub" style="margin-top:8px">拖拽旋转 · 滚轮缩放 · 点击卦象</div>
</div>
<script>
(function(){
  const toggle = document.getElementById('hudToggle');
  const hud = document.getElementById('hud');
  const closeBtn = hud.querySelector('.hud-close');
  closeBtn.addEventListener('click', ()=>{
    hud.classList.add('collapsed');
    setTimeout(()=>{ hud.style.display='none'; toggle.style.display='flex'; },200);
  });
  toggle.addEventListener('click', ()=>{
    toggle.style.display='none';
    hud.style.display='';
    requestAnimationFrame(()=>requestAnimationFrame(()=>hud.classList.remove('collapsed')));
  });
})();
</script>

/* 位置字符串 "abcdef" : a 最高(第六爻), f 最低(第一爻). 索引爻位 p=1..6 对应字符 index 6-p */
function firmPositions(bits){
  const s = [];
  for(let p=1;p<=6;p++) if(bits[6-p]==='1') s.push(p);
  return s;
}
function yieldPositions(bits){
  const s = [];
  for(let p=1;p<=6;p++) if(bits[6-p]==='0') s.push(p);
  return s;
}

/* 爻位 -> 角度: 复(firm@1)在 120°(4点钟方向), 顺时针递增 60° */
function angleOfPos(p){ return THREE.MathUtils.degToRad(120 + (p-1)*60); }

/* 赤道层(k=3)每个主经度簇有 3 卦:
   - 1 个 3 连阳"主卦"(泰/否/咸/恒/损/益): 无孤立阳爻 -> 置于主经线
   - 2 个陪位: 找到其唯一的"孤立阳爻"(相邻两爻皆阴),
     该阳爻角度相对于簇中心的符号决定左右 */
function isolatedFirmPos(firms){
  const set = new Set(firms);
  for(const p of firms){
    const prev = ((p-2+6)%6)+1;
    const next = (p%6)+1;
    if(!set.has(prev) && !set.has(next)) return p;
  }
  return null; // 3 连阳 -> 主卦
}

/* 圆平均: 返回 {theta, r_len}. r_len≈0 表示各方向对称 -> 置于中轴 */
function circMean(angles){
  let x=0,y=0;
  for(const a of angles){ x+=Math.cos(a); y+=Math.sin(a); }
  x/=angles.length; y/=angles.length;
  return {theta:Math.atan2(y,x), r:Math.hypot(x,y)};
}

/* ========= 赤道层硬编码: 6 组三联(按经度中心; [左, 主, 右]) ========= */
const EQUATOR_GROUPS = {
  0:   {left:53, main:12, right:17},
  60:  {left:21, main:42, right:59},
  120: {left:60, main:41, right:22},
  180: {left:18, main:11, right:54},
  240: {left:55, main:32, right:48},
  300: {left:47, main:31, right:56}
};
const EQUATOR_DELTA = 12; // ±12° 水平间距
const equatorPlacement = {}; // num -> {thetaDeg, role}
Object.entries(EQUATOR_GROUPS).forEach(([c,g])=>{
  const cd = +c;
  equatorPlacement[g.left]  = {thetaDeg: cd - EQUATOR_DELTA, role:'flank'};
  equatorPlacement[g.main]  = {thetaDeg: cd,                 role:'main'};
  equatorPlacement[g.right] = {thetaDeg: cd + EQUATOR_DELTA, role:'flank'};
});

/* ========= 计算每卦的三维坐标 ========= */
const R = 10;
const LAT = {0:-Math.PI/2, 1:-Math.PI/3, 2:-Math.PI/6, 3:0, 4:Math.PI/6, 5:Math.PI/3, 6:Math.PI/2};
const nodes = []; // {num,name,bits,k,pos,onAxis,theta}

// 中轴同层偏移计数
const axisCount = {};

HEX.forEach(([num,name,bits])=>{
  const firms = firmPositions(bits);
  const k = firms.length;
  const lat = LAT[k];
  let pos, onAxis=false, theta=0;

  if(k===0){ // 坤
    pos = new THREE.Vector3(0,-R,0);
  } else if(k===6){ // 乾
    pos = new THREE.Vector3(0,R,0);
  } else {
    // 特殊处理: level III (k=3) 的 既济(63)/未济(64) -> 中轴中心
    // 其余按圆平均; r≈0 则置中轴
    const angs = firms.map(angleOfPos);
    const cm = circMean(angs);
    const y = R*Math.sin(lat);
    const r = R*Math.cos(lat);
    if(cm.r < 0.05){
      onAxis = true;
      // 中心层(k=3)既济未济置于原点上下微偏; 其余中轴卦沿 y 轴
      const key = k;
      axisCount[key] = (axisCount[key]||0);
      const idx = axisCount[key]++;
      // 中轴堆叠: 让 k=2/4 三联 (震坎艮 / 巽离兑) 的"标签"相邻间距 = k=3 两卦 (既未济) 的标签间距
      // 既未济: 节点 y=±0.24, 标签外推 0.55(方向相反) -> 标签 y=±0.79, 间距 1.58
      // k=2/4: 三个节点标签方向相同(都 +y 或 -y), 故节点间距 = 标签间距 = 1.58
      const worldOffs = (k===3) ? [-0.24, 0.24][idx] : [-1.58, 0, 1.58][idx];
      pos = new THREE.Vector3(0, y + worldOffs, 0);
    } else {
      theta = cm.theta;
      let yy = y, rr = r;
      // 赤道(k=3)表面 18 卦 -> 按硬编码 6 组三联 + ±12° 水平展开
      if(k===3 && equatorPlacement[num]){
        const p = equatorPlacement[num];
        theta = THREE.MathUtils.degToRad(p.thetaDeg);
        yy = 0; rr = R;
        pos = new THREE.Vector3(rr*Math.cos(theta), yy, rr*Math.sin(theta));
        nodes.push({num,name,bits,k,pos,onAxis,theta,equatorRole:p.role});
        return;
      }
      pos = new THREE.Vector3(rr*Math.cos(theta), yy, rr*Math.sin(theta));
    }
  }
  nodes.push({num,name,bits,k,pos,onAxis,theta});
});

// 在 CPU 端采样高密度控制点 (MONTH_PATH_PTS), 供 shader 做球面多边形 winding + 最近弧距离测试
const taijiMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  side: THREE.FrontSide,
  uniforms: {
    uAlpha:{value:0.7},
    uEdge:{value: THREE.MathUtils.degToRad(6)}, // 边界过渡 ~6°
    uLightColor:{value: new THREE.Color(0xcfc8b9)},   // 阳(乾)侧 - 哑光奶雾白(低亮度,浅素白)
    uDarkColor:{value: new THREE.Color(0x111111)},    // 阴(坤)侧 - 近黑
    uFlip:{value: 1.0},
    uPts:{value: new Array(48).fill(0).map(_=>new THREE.Vector3(1,0,0))},
    uN:{value: 48}
  },
  vertexShader:`
    varying vec3 vPos;
    void main(){
      vPos = normalize(position);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader:`
    precision highp float;
    #define MAX_PTS 48
    varying vec3 vPos;
    uniform float uAlpha;
    uniform float uEdge;
    uniform vec3 uLightColor;
    uniform vec3 uDarkColor;
    uniform vec3 uPts[MAX_PTS];
    uniform int uN;
    uniform float uFlip;
    #define PI 3.141592653589793

    // 球面点到大圆弧 (a->b) 的角距离 (弧度), 若投影在弧外则取端点距离
    float arcAngDist(vec3 n, vec3 a, vec3 b){
      vec3 m = cross(a,b);
      float ml = length(m);
      if(ml < 1e-6){
        return acos(clamp(dot(n,a),-1.0,1.0));
      }
      m /= ml;
      float dPlane = asin(clamp(abs(dot(n,m)),0.0,1.0));
      vec3 proj = normalize(n - m*dot(n,m));
      float ang_a = acos(clamp(dot(proj,a),-1.0,1.0));
      float ang_b = acos(clamp(dot(proj,b),-1.0,1.0));
      float total = acos(clamp(dot(a,b),-1.0,1.0));
      if(ang_a + ang_b > total + 0.002){
        return min(acos(clamp(dot(n,a),-1.0,1.0)), acos(clamp(dot(n,b),-1.0,1.0)));
      }
      return dPlane;
    }

    void main(){
      vec3 n = normalize(vPos);
      // 1) winding: sum 球面切空间中相邻控制点相对 n 的方位角
      float winding = 0.0;
      float minD = 1e3;
      for(int i=0;i<MAX_PTS;i++){
        if(i>=uN) break;
        int j = i+1; if(j>=uN) j = 0;
        vec3 a = uPts[i];
        vec3 b = uPts[j];
        // 距离
        float d = arcAngDist(n,a,b);
        if(d<minD) minD = d;
        // winding 贡献
        vec3 pa = a - n*dot(a,n); float la = length(pa);
        vec3 pb = b - n*dot(b,n); float lb = length(pb);
        if(la>1e-6 && lb>1e-6){
          pa/=la; pb/=lb;
          float c = clamp(dot(pa,pb),-1.0,1.0);
          float s = dot(cross(pa,pb), n);
          winding += atan(s,c);
        }
      }
      // winding 在球面闭合多边形两侧约为 ±2π, 符号决定阴阳侧
      float side = sign(winding) * uFlip; // +1 -> 阴(白), -1 -> 阳(灰)
      float signedD = minD * side;
      float t = smoothstep(-uEdge, uEdge, signedD);
      vec3 col = mix(uDarkColor, uLightColor, t);
      // 阳侧(奶雾白): 轻微纬度渐变 + Fresnel 边缘再压暗,做哑光朦胧效果,不产生高光
      float yang = smoothstep(0.0, 1.0, t);
      float lat = vPos.y * 0.5 + 0.5;               // 0(南极)~1(北极)
      float gradY = mix(0.88, 1.02, lat);           // 上亮下暗, 幅度柔和
      float fres = pow(1.0 - clamp(vPos.z, 0.0, 1.0), 1.2);
      float matteK = mix(1.0, gradY * (0.94 - 0.10*fres), yang);
      col *= matteK;
      gl_FragColor = vec4(col, uAlpha);
    }
  `
});
const taiji = new THREE.Mesh(new THREE.SphereGeometry(R*1.002, 128, 96), taijiMat);

/* 经纬线 (淡青色细线框) - 使用 Line2 实现可控线宽 (2x 粗) */
const GRID_COLOR = 0x9fe8ff;

const gridLineMats = []; // 记录以便 resize 时更新 resolution
function makeFatLine(pts, color, opacity, linewidth){
  const flat = new Float32Array(pts.length*3);
  for(let i=0;i<pts.length;i++){
    flat[i*3]=pts[i].x; flat[i*3+1]=pts[i].y; flat[i*3+2]=pts[i].z;
  }
  const geo = new LineGeometry(); geo.setPositions(flat);
  const mat = new LineMaterial({
    color, linewidth, transparent:true, opacity,
    depthWrite:false,
    resolution: new THREE.Vector2(window.innerWidth, window.innerHeight)
  });
  gridLineMats.push(mat);
  const line = new Line2(geo, mat);
  line.computeLineDistances();
  return line;
}
function addCircle(lat, color=GRID_COLOR, op=0.55, lw=2){
  const r = (R*1.005)*Math.cos(lat), y = (R*1.005)*Math.sin(lat);
  const pts=[]; const seg=256;
  for(let i=0;i<=seg;i++){
    const t = i/seg*Math.PI*2;
    pts.push(new THREE.Vector3(r*Math.cos(t), y, r*Math.sin(t)));
  }
  gridGroup.add(makeFatLine(pts, color, op, lw));
}
function addMeridian(lon, color=GRID_COLOR, op=0.4, lw=2){
  const pts=[]; const seg=128;
  for(let i=0;i<=seg;i++){
    const ph = -Math.PI/2 + i/seg*Math.PI;
    pts.push(new THREE.Vector3((R*1.005)*Math.cos(ph)*Math.cos(lon), (R*1.005)*Math.sin(ph), (R*1.005)*Math.cos(ph)*Math.sin(lon)));
  }
  gridGroup.add(makeFatLine(pts, color, op, lw));
}
[Math.PI/3, Math.PI/6, -Math.PI/6, -Math.PI/3].forEach(l=>addCircle(l, GRID_COLOR, 0.55, 2));

  }
  const t=new THREE.CanvasTexture(cv); t.anisotropy=4;
  return {tex:t, w:cv.width, h:cv.height};
}

/* ========= 变爻连线 (每卦与其翻转一爻得到的六卦相连) ========= */
const numToNode = {}; nodes.forEach(n=>numToNode[n.num]=n);
const bitsToNode = {}; nodes.forEach(n=>bitsToNode[n.bits]=n);

function neighborsOf(node){
  const out=[];
  for(let p=1;p<=6;p++){
    const idx = 6-p;
    const b = node.bits.split('');
    b[idx] = b[idx]==='1'?'0':'1';
    out.push(bitsToNode[b.join('')]);
  }
  return out;
}

// 向外拱起的平滑弧线 (三次贝塞尔, 控制点在中垂线向外 1.35R 处)
const TAIJI_PAIRS = new Set(['1-43','1-44']);
function makeArcCurve(posA, posB, R, segments){
  const mid = posA.clone().add(posB).multiplyScalar(0.5);
  const outDir = mid.clone().normalize();
  // 控制点: 中点沿球心外推到 1.35 倍半径
  const cp = outDir.clone().multiplyScalar(R * 1.35);
  const curve = new THREE.QuadraticBezierCurve3(posA.clone(), cp, posB.clone());
  return curve.getPoints(segments);
}
const seen = new Set();
nodes.forEach(n=>{
  neighborsOf(n).forEach(m=>{
    const key = n.num<m.num ? n.num+'-'+m.num : m.num+'-'+n.num;
    if(seen.has(key)) return; seen.add(key);
    let g;
    if(TAIJI_PAIRS.has(key)){
      const R = n.pos.length();
      const pts = makeArcCurve(n.pos, m.pos, R, 64);
      g = new THREE.BufferGeometry().setFromPoints(pts);
    } else {
      g = new THREE.BufferGeometry().setFromPoints([n.pos,m.pos]);
    }
    const ca = new THREE.Color(nodeColor(n.bits));
    const cb = new THREE.Color(nodeColor(m.bits));
    const mix = ca.clone().lerp(cb,0.5).multiplyScalar(0.55);
    const mat = new THREE.LineBasicMaterial({color:mix,transparent:true,opacity:0.28, blending:THREE.AdditiveBlending, depthWrite:false});
    const line = new THREE.Line(g,mat);
    line.userData = {a:n.num, b:m.num, baseColor:mix.clone(), baseOpacity:0.28};
    edgeGroup.add(line);
    nodeEdges.get(n.num).push(line);
    nodeEdges.get(m.num).push(line);
  });
});

/* 十二消息卦(月令)闭合曲线: 复→临→泰→大壮→夬→乾→姤→遯→否→观→剥→坤→复 */
const MONTH_SEQ = [24,19,11,34,43,1,44,33,12,20,23,2];
const MONTH_NAMES = ['冬至·子(十一月)','丑(十二月)','寅(正月)','卯(二月)','辰(三月)','巳(四月)','午(五月)','未(六月)','申(七月)','酉(八月)','戌(九月)','亥(十月)'];
const monthGroup = new THREE.Group(); scene.add(monthGroup); monthGroup.visible=true;

// 将一条闭合曲线反复采样并投影回球面, 得到贴合球面的光滑样条 (更像太极 S 曲线)
// 球面点之间的 slerp
function _slerpOnSphere(a, b, t, radius){
  const an = a.clone().normalize();
  const bn = b.clone().normalize();
  const d = THREE.MathUtils.clamp(an.dot(bn), -1, 1);
  const omega = Math.acos(d);
  if(omega < 1e-5) return an.multiplyScalar(radius);
  const s = Math.sin(omega);
  const out = an.multiplyScalar(Math.sin((1-t)*omega)/s)
                .add(bn.multiplyScalar(Math.sin(t*omega)/s));
  return out.multiplyScalar(radius);
}

// 球面闭合曲线的"全程圆润"平滑:
//   1) centripetal Catmull-Rom 粗采样
//   2) 按等弧长重参数化, 保证采样均匀
//   3) 对 x/y/z 三个分量做闭合 Fourier 低通 (保留 K 阶谐波), 得到 C∞ 光滑周期曲线
//   4) 投回球面 -> 最终样条 (centripetal)
// K 越小越圆, 取 6 阶保留月令 S 形整体结构, 消除所有折角与抖动.
function smoothClosedCurveOnSphere(controlPts, { samples=512, radius=R, harmonics=6 } = {}){
  // step1: 粗样条采样 (centripetal)
  const pre = new THREE.CatmullRomCurve3(controlPts.slice(), true, 'centripetal', 0.5);
  const raw = pre.getPoints(samples);
  if(raw.length>1 && raw[0].distanceTo(raw[raw.length-1])<1e-4) raw.pop();
  for(const p of raw) p.normalize().multiplyScalar(radius);
  const N = raw.length;

  // step2: 等弧长重参数化 (线性插值)
  const cum = new Array(N+1); cum[0]=0;
  for(let i=0;i<N;i++){
    const a = raw[i], b = raw[(i+1)%N];
    cum[i+1] = cum[i] + a.distanceTo(b);
  }
  const total = cum[N];
  const M = samples; // 均匀采样数
  const uni = new Array(M);
  let j = 0;
  for(let i=0;i<M;i++){
    const s = (i/M)*total;
    while(j<N && cum[j+1] < s) j++;
    const t = (s - cum[j]) / Math.max(1e-9, cum[j+1]-cum[j]);
    const a = raw[j%N], b = raw[(j+1)%N];
    uni[i] = a.clone().lerp(b, t);
  }

  // step3: 闭合 Fourier 低通 (DFT -> 截断 -> IDFT)
  const K = harmonics;
  const fx = new Float64Array(2*K+1), fy = new Float64Array(2*K+1), fz = new Float64Array(2*K+1);
  const gx = new Float64Array(2*K+1), gy = new Float64Array(2*K+1), gz = new Float64Array(2*K+1);
  for(let k=0;k<=K;k++){
    let axC=0,ayC=0,azC=0, axS=0,ayS=0,azS=0;
    for(let i=0;i<M;i++){
      const th = 2*Math.PI*k*i/M;
      const c = Math.cos(th), s = Math.sin(th);
      const p = uni[i];
      axC += p.x*c; ayC += p.y*c; azC += p.z*c;
      axS += p.x*s; ayS += p.y*s; azS += p.z*s;
    }
    const scale = (k===0)?(1/M):(2/M);
    fx[k]=axC*scale; fy[k]=ayC*scale; fz[k]=azC*scale;
    gx[k]=axS*scale; gy[k]=ayS*scale; gz[k]=azS*scale;
  }
  // 重建 + 球面投影
  const outN = 360;
  const outPts = new Array(outN);
  for(let i=0;i<outN;i++){
    let x=fx[0], y=fy[0], z=fz[0];
    for(let k=1;k<=K;k++){
      const th = 2*Math.PI*k*i/outN;
      const c = Math.cos(th), s = Math.sin(th);
      x += fx[k]*c + gx[k]*s;
      y += fy[k]*c + gy[k]*s;
      z += fz[k]*c + gz[k]*s;
    }
    const v = new THREE.Vector3(x,y,z).normalize().multiplyScalar(radius);
    outPts[i] = v;
  }
  // step4: 构造最终闭合样条 (centripetal)
  return new THREE.CatmullRomCurve3(outPts, true, 'centripetal', 0.5);
}

// 球面投影 curve: 包裹任意 base curve, 每次采样都重新投影到半径 R 的球面
class _SphericalCurve extends THREE.Curve {
  constructor(base, radius){ super(); this.base = base; this.radius = radius; }
  getPoint(t, target){
    const p = this.base.getPoint(t, target || new THREE.Vector3());
    const L = p.length() || 1;
    return p.multiplyScalar(this.radius / L);
  }
}

(function buildMonth(){
  // 12 个月令卦位直接做控制点 (都在球面上) -> CatmullRom 闭合经过每个点
  // centripetal 参数化 + tension 0.5 保证过每个中心且无打结; 再用 _SphericalCurve
  // 在每次采样时径向投影回球面 R, 使弧线丰满饱和地贴合球面
  const ctrl = MONTH_SEQ.map(n => numToNode[n].pos.clone());
  // Fourier 低通平滑 (harmonics=8): 消除所有折角, 得到 C∞ 太极 S 涡旋闭环
  const curve = smoothClosedCurveOnSphere(ctrl, { samples: 600, radius: R, harmonics: 8 });
  // 采样曲线上 48 个点, 单位化, 写入阴阳 shader 作为球面多边形顶点
  const samples = curve.getPoints(48); // 49 pts (首尾相接), 取前 48
  const upts = taijiMat.uniforms.uPts.value;
  for(let i=0;i<48;i++) upts[i].copy(samples[i]).normalize();
  taijiMat.uniforms.uN.value = 48;
  taijiMat.uniforms.uPts.needsUpdate = true;
  // 自动栠正 uFlip: 取 乾1 附近(北+东上方)作为"阳侧"参考, 期望该处 side=-1 -> uDarkColor
  const testP = numToNode[9].pos.clone().normalize(); // 第9卦 小畜 k=5 在阳侧
  let winding = 0;
  for(let i=0;i<48;i++){
    const a = upts[i], b = upts[(i+1)%48];
    const pa = a.clone().addScaledVector(testP, -a.dot(testP));
    const pb = b.clone().addScaledVector(testP, -b.dot(testP));
    if(pa.lengthSq()<1e-8 || pb.lengthSq()<1e-8) continue;
    pa.normalize(); pb.normalize();
    const c = Math.max(-1,Math.min(1, pa.dot(pb)));
    const s = new THREE.Vector3().crossVectors(pa, pb).dot(testP);
    winding += Math.atan2(s, c);
  }
  taijiMat.uniforms.uFlip.value = -Math.sign(winding) || 1;
  // ======= 分段构建月令线: 支持前后半球差异化样式 =======
  const SEG_N = 180;                       // 段数 (增密, 更圆润)
  const PTS_PER_SEG = 8;                   // 每段内部采样点
  const DENSE = curve.getPoints(SEG_N * PTS_PER_SEG);  // 连续点列
  monthSegments = [];                      // 暴露给 updater
  // 共享材质 (前面: 亮金实线 + 暖光晕; 背面: 低亮度灰色虚线)
  const matFrontCore = new THREE.MeshBasicMaterial({color:0xfff18a, transparent:true, opacity:1.0, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false});
  const matFrontHalo = new THREE.MeshBasicMaterial({color:0xffa820, transparent:true, opacity:0.35, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false});
  const matBackCore  = new THREE.MeshBasicMaterial({color:0x9a9a9a, transparent:true, opacity:0.28, blending:THREE.NormalBlending, depthWrite:false, depthTest:false});
  monthMats = { matFrontCore, matFrontHalo, matBackCore };
  const DN = DENSE.length;
  for(let i=0;i<SEG_N;i++){
    // 取此段点 + 前后各 1 个邻接点做样条平滑, 与下一段无缝衔接
    const segPts = [];
    for(let j=-1; j<=PTS_PER_SEG; j++){
      const idx = ((i*PTS_PER_SEG + j) % DN + DN) % DN;
      segPts.push(DENSE[idx].clone());
    }
    const segCurve = new THREE.CatmullRomCurve3(segPts, false, 'centripetal', 0.5);
    // 仅取对应本段的参数范围
    const coreGeo = new THREE.TubeGeometry(segCurve, 10, 0.045, 12, false);
    const haloGeo = new THREE.TubeGeometry(segCurve, 10, 0.13, 12, false);
    const core = new THREE.Mesh(coreGeo, matFrontCore);
    const halo = new THREE.Mesh(haloGeo, matFrontHalo);
    core.renderOrder = 999;
    halo.renderOrder = 998;
    monthGroup.add(core);
    monthGroup.add(halo);
    // 中点 (单位向量) 用于前后判定
    const midIdx = (i*PTS_PER_SEG + Math.floor(PTS_PER_SEG/2)) % DN;
    const mid = DENSE[midIdx].clone().normalize();
    monthSegments.push({ core, halo, mid, idx:i });
  }
  monthPulse = null; // 关闭脉动: 保持恒定高亮
  // 月份节点小球
  MONTH_SEQ.forEach(n=>{
    const node = numToNode[n];
    const out = node.pos.clone().normalize();
    const dotG = new THREE.SphereGeometry(0.25, 12, 10);
    const dotM = new THREE.MeshBasicMaterial({color:0xffe17a, transparent:true, opacity:0.95, blending:THREE.AdditiveBlending, depthWrite:false});
    const dot = new THREE.Mesh(dotG, dotM);
    dot.position.copy(node.pos).addScaledVector(out, 0.25);
    monthGroup.add(dot);
  });
  // 月份文字标签
  const _monthLabels = [];          // 收集引用, 供景深透明度更新
  MONTH_SEQ.forEach((n,i)=>{
    const node = numToNode[n];
    const out = node.pos.clone().normalize();
    const div = document.createElement('div');
    div.className = 'month-label';
    div.textContent = MONTH_NAMES[i];
    div.style.cssText = 'color:#ffe17a;font-size:11px;padding:2px 6px;background:rgba(40,30,10,.55);border:1px solid rgba(255,200,90,.5);border-radius:10px;text-shadow:0 0 4px #ffa820;font-family:"Microsoft YaHei",serif;white-space:nowrap';
    const obj = new CSS2DObject(div);
    obj.position.copy(node.pos).addScaledVector(out, 1.5);
    monthGroup.add(obj);
    _monthLabels.push({ obj, el: div });
  });
  window._monthLabels = _monthLabels;  // 暴露给 updateLabels 使用
})();

const ray = new THREE.Raycaster();

const info = document.getElementById('info');

function showInfo(node){
  const nbs = neighborsOf(node);
  info.style.display='block';
  info.innerHTML = `
    <h2>${node.name} <span class="num">#${node.num}</span></h2>

  info.querySelectorAll('span[data-num]').forEach(el=>{

    };

function flyTo(p){
  const dir = p.clone().normalize().multiplyScalar(25);
  const start = camera.position.clone();
  const end = dir.length()<1?new THREE.Vector3(22,14,22):dir;
  let t=0; const dur=600, t0=performance.now();
  (function loop(){
    t = Math.min(1,(performance.now()-t0)/dur);
    camera.position.lerpVectors(start, end, t);
    controls.target.lerp(new THREE.Vector3(0,0,0), 0.2);
    if(t<1) requestAnimationFrame(loop);
  })();
}

function pickNode(e){
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(sprites, false);
  // 收集候选: (1) 球点 sprite 命中; (2) 鼠标位于标签矩形内
  const candidates = [];
  hits.forEach(h => candidates.push(h.object.userData));
  for(const L of labels){
    const r = L.el.getBoundingClientRect();
    if(r.width===0) continue;
    if(e.clientX>=r.left && e.clientX<=r.right && e.clientY>=r.top && e.clientY<=r.bottom){
      candidates.push(L.node);
    }
  }
  if(!candidates.length) return null;
  // 景深排序: 取距相机最近的一个
  let best = candidates[0], bestD = camera.position.distanceTo(best.pos);
  for(let i=1;i<candidates.length;i++){
    const d = camera.position.distanceTo(candidates[i].pos);
    if(d < bestD){ bestD = d; best = candidates[i]; }
  }
  return best;
}
// 同步 .hot 类
function setHotLabel(node){
  for(const L of labels){
    L.el.classList.toggle('hot', node && L.node.num===node.num);
  }
}

/* ★ 移动端双击交互 (V27 README) ★
   单击: 仅高亮
   双击(300ms内): 高亮 + 弹古图 + 弹详情 */
let __lastTapTime = 0;
let __lastTapNode = null;
renderer.domElement.addEventListener('pointerdown', e => {
  const node = pickNode(e);
  if(!node) return;
  const now = Date.now();
  const isDouble = (now - __lastTapTime < 300) && __lastTapNode === node;
  if(isDouble){
    highlight(node);
    if(window.showHexImage) showHexImage(node);
    if(window.showHexDetail) showHexDetail(node);
    __lastTapTime = 0;
    __lastTapNode = null;
  } else {
    highlight(node);
    __lastTapTime = now;
    __lastTapNode = node;
  }
});

  // 2. 发光 Tube
  clearHoverGlow();
  const nbs = neighborsOf(node);
  nbs.forEach(m=>{
    if(!m) return;
    const curve = new THREE.LineCurve3(node.pos.clone(), m.pos.clone());
    const tube = new THREE.TubeGeometry(curve, 2, 0.07, 8, false);
    const mat = new THREE.MeshBasicMaterial({color:0xffaa00, transparent:true, opacity:0.85, blending:THREE.AdditiveBlending, depthWrite:false});
    hoverGlow.add(new THREE.Mesh(tube, mat));
  });
  // 3. 信息卡片
  tooltip.innerHTML = buildTooltipHTML(node);
  tooltip.style.display = 'block';
  renderer.domElement.style.cursor = 'pointer';
  setHotLabel(node);
}
function hoverLeave(){
  if(!currentHover) return;
  currentHover = null;

}

/* 标签距离衰减: 近处 opacity=1, 远处 opacity=0.3, 远处 blur 最多 2px */
const _v = new THREE.Vector3();
const _camDir = new THREE.Vector3();
let _updateLabelsLastT = performance.now()*0.001;
// ease-in-out (smoothstep-style, 对称)
function _easeInOut(x){ x = Math.max(0, Math.min(1, x)); return x*x*(3 - 2*x); }
function updateLabels(){
  const frontOnly = document.getElementById('tgFront') && document.getElementById('tgFront').checked;
  _camDir.copy(camera.position).normalize();
  // 帧时间 (用于渐变插值)
  const nowT = performance.now()*0.001;
  const dt = Math.min(0.1, Math.max(0, nowT - _updateLabelsLastT));
  _updateLabelsLastT = nowT;
  const FADE_RATE = 3.0; // 过渡速度 (每秒指数衰减倍数), 越大越快
  const k = 1 - Math.exp(-dt * FADE_RATE);
  // 动态估算球面上最近/最远的标签距离
  let dMin = Infinity, dMax = -Infinity;
  for(const L of labels){
    L.obj.getWorldPosition(_v);
    L._d = camera.position.distanceTo(_v);
    // 背面判断: 节点位置与相机方向 dot < 0 为背面
    L._front = _v.clone().normalize().dot(_camDir) > 0.0;
    if(L._alpha === undefined) L._alpha = L._front ? 1 : 0;
    if(L._d<dMin) dMin = L._d;
    if(L._d>dMax) dMax = L._d;
  }
  const span = Math.max(1e-3, dMax - dMin);
  const _yearMode = (motion.mode === 'year');
  const _monthSet = _yearMode ? new Set(MONTH_SEQ) : null;
  for(const L of labels){
    // 月令循环: 非月令卦标签始终隐藏, 跳过后续处理
    if(_yearMode && !_monthSet.has(L.node.num)){
      L.obj.visible = false;
      L.el.style.display = 'none';
      continue;
    }
    // 目标可见度: frontOnly + 前半球 = 1, 背面 = 0, 非 frontOnly = 1
    const target = (!frontOnly || L._front) ? 1 : 0;
    L._alpha += (target - L._alpha) * k;
    const a = _easeInOut(L._alpha);
    const hide = !_yearMode && frontOnly && a < 0.02;
    // 三维空间背面剔除: Three.js Object3D.visible=false 后 CSS2DRenderer 根本不渲染
    L.obj.visible = !hide;
    L.el.style.display = hide ? 'none' : '';
    if(hide){
      L.el.style.opacity = '0';
      L.el.style.visibility = 'hidden';
      continue;
    }
    L.el.style.visibility = 'visible';
    if(_yearMode){
      // 月令循环: 基于距离的景深透明度 (近=1, 远=0.05), 无 blur, 大小恒定
      const t = (L._d - dMin) / span;
      const op = THREE.MathUtils.lerp(1.0, 0.01, t);
      L.el.style.opacity = op.toFixed(3);
      L.el.style.filter = 'none';
    } else if(frontOnly){
      // 无景深 + 渐变出入场
      L.el.style.opacity = a.toFixed(3);
      L.el.style.filter = 'none';
    } else {
      const t = (L._d - dMin) / span;
      const op = THREE.MathUtils.lerp(1.0, 0.3, t);
      const blur = t*2.0;
      L.el.style.opacity = op.toFixed(3);
      L.el.style.filter = blur>0.15 ? `blur(${blur.toFixed(2)}px)` : 'none';
    }
  }
  // 月令循环: 月份标签也应用相同的距离景深透明度
  if(_yearMode && window._monthLabels){
    const _mlv = new THREE.Vector3();
    for(const ml of window._monthLabels){
      ml.obj.getWorldPosition(_mlv);
      const d = camera.position.distanceTo(_mlv);
      const t = (d - dMin) / span;
      const op = THREE.MathUtils.lerp(1.0, 0.01, Math.min(Math.max(t,0),1));
      ml.el.style.opacity = op.toFixed(3);
    }
  } else if(window._monthLabels){
    for(const ml of window._monthLabels) ml.el.style.opacity = '1';
  }
  // 主视图模式: 球点 sprite 按前后半球渐变
  if(frontOnly){
    for(const s of sprites){
      // 月令循环: 非月令卦小球始终隐藏
      if(_yearMode && !_monthSet.has(s.userData.num)){ s.visible = false; continue; }
      const nz = s.position.clone().normalize().dot(_camDir);
      const front = nz > 0.0;
      if(s.userData._alpha === undefined) s.userData._alpha = front ? 1 : 0;
      s.userData._alpha += ((front?1:0) - s.userData._alpha) * k;
      const a = _easeInOut(s.userData._alpha);
      s.visible = _yearMode || a > 0.02; // 月令模式下月令卦始终可见
      if(s.material) s.material.opacity = _yearMode ? 1.0 : a;
    }
  } else {
    for(const s of sprites){
      // 月令循环: 非月令卦小球始终隐藏
      if(_yearMode && !_monthSet.has(s.userData.num)){ s.visible = false; continue; }
      s.visible = true;
      if(s.material) s.material.opacity = 1.0;
      s.userData._alpha = 1;
    }
  }
  // 变爻连线: 两端都在前半球 -> 1, 否则 0, 随相机渐变
  const showEdges = document.getElementById('tgLines').checked;
  for(const line of edgeGroup.children){
    if(!showEdges){ line.visible = false; continue; }
    let target = 1;
    if(frontOnly){
      const a = numToNode[line.userData.a].pos;
      const b = numToNode[line.userData.b].pos;
      const fa = a.clone().normalize().dot(_camDir) > 0;
      const fb = b.clone().normalize().dot(_camDir) > 0;
      target = (fa && fb) ? 1 : 0;
    }
    if(line.userData._alpha === undefined) line.userData._alpha = target;
    line.userData._alpha += (target - line.userData._alpha) * k;
    const la = _easeInOut(line.userData._alpha);
    line.visible = la > 0.02;
    if(line.material && line.material.opacity !== undefined){
      // 保留 hover 暗化时的目标 opacity 不超过 la
      const base = line.material.userData?._baseOpacity ?? line.material.opacity;
      // 记录一次基线, 避免反复覆盖
      if(!line.material.userData) line.material.userData = {};
      if(line.material.userData._baseOpacity === undefined) line.material.userData._baseOpacity = base;
      line.material.opacity = Math.min(base, la);
    }
  }
}

/* ========== 相对运动系统 ========== */
// 保存原始位置 (用于 orbit 模式复位)
sprites.forEach(s => { s.userData._orig = s.position.clone(); s.userData._baseScale = s.scale.x; });
labels.forEach(L => { L._orig = L.obj.position.clone(); });

// 重建月令曲线引用 (用于 year 模式流光) - 使用同一球面平滑算法
const _monthPts = MONTH_SEQ.map(n => numToNode[n].pos.clone());
_monthPts.push(_monthPts[0].clone());
const monthCurveRef = smoothClosedCurveOnSphere(_monthPts, { samples: 600, radius: R, harmonics: 8 });

const motion = {
  mode: 'off',
  tSwitch: 0,
  // year
  yearIdx: 0,
  yearTNext: 0,
  yearMarker: null,   // 沿月令线流动的光点
  yearHighlight: null,// 当前月份卦外圈光环
  // yao
  yaoPulses: [],      // 各 6 条爻变边的脉冲小球
  yaoOwner: null,     // 当前所属卦 num
  // enlighten / helix
  pathTube: null,
  pathCurve: null,
  traveler: null,
  travelerRing: null,
  travelerPrevNum: null,
  // flow (全局爻变粒子流)
  flow: null,       // THREE.InstancedMesh
  flowEdges: null,  // [{a,b,u,speed}]
  flowGroups: null, // { 1..5, axis: sprite[] }
  flowLastT: 0,
};
const _flowMat4 = new THREE.Matrix4();

/* 登天螺旋路径: 坤 -> k=1..5 五层环绕 -> 乾 (参见 pdf 图 7.04/7.05) */
function buildEnlightenWaypoints(){
  const pts = [];
  const levelEntries = {1:24, 2:19, 3:11, 4:34, 5:43};
  const LIFT = 1.08; // 稍微离开球面
  pts.push(numToNode[2].pos.clone().multiplyScalar(LIFT));
  for(let k=1;k<=5;k++){
    let ring = nodes.filter(n => n.k===k && !n.onAxis).slice();
    // 按经度 theta 排序
    ring.sort((a,b)=>{
      const ta = (a.theta % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
      const tb = (b.theta % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
      return ta - tb;
    });
    const entry = numToNode[levelEntries[k]];
    let idx = ring.findIndex(n=>n.num===entry.num);
    if(idx<0) idx = 0;
    ring = [...ring.slice(idx), ...ring.slice(0,idx)];
    // k=4,5 逆向 (pdf: 上半球相反方向)
    if(k>=4) ring = [ring[0], ...ring.slice(1).reverse()];
    ring.forEach(n => pts.push(n.pos.clone().multiplyScalar(LIFT)));
    // 回到入口完成该层闭合, 然后上升到下层入口前再加一个稍高的过渡点
    pts.push(entry.pos.clone().multiplyScalar(LIFT));
  }
  pts.push(numToNode[1].pos.clone().multiplyScalar(LIFT));
  return pts;
}

function buildHelixWaypoints(){
  // 从南极到北极, 均匀球面螺旋 (4 圈)
  const pts = [];
  const turns = 4;
  const N = 240;
  for(let i=0;i<=N;i++){
    const u = i/N;
    const lat = -Math.PI/2 + u*Math.PI;
    const lon = u*Math.PI*2*turns;
    const r = R*1.08;
    pts.push(new THREE.Vector3(r*Math.cos(lat)*Math.cos(lon), r*Math.sin(lat), r*Math.cos(lat)*Math.sin(lon)));
  }
  return pts;
}

function makePathTube(curve, color){
  const geo = new THREE.TubeGeometry(curve, 600, 0.07, 10, false);
  const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.55, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 1050;
  return mesh;
}

function makeGlowSphere(color, size){
  const g = new THREE.SphereGeometry(size, 14, 10);
  const m = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.95, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false});
  const mesh = new THREE.Mesh(g,m);
  mesh.renderOrder = 1200;
  return mesh;
}
function makeRing(color, radius){
  const g = new THREE.TorusGeometry(radius, 0.06, 8, 48);
  const m = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.9, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false});
  const mesh = new THREE.Mesh(g,m);
  mesh.renderOrder = 1100;
  return mesh;
}

function resetMotion(){
  // 复位位置与缩放
  sprites.forEach(s => { s.position.copy(s.userData._orig); s.scale.setScalar(s.userData._baseScale); s.material.opacity = 1.0; s.visible = true; });
  labels.forEach(L => { L.obj.position.copy(L._orig); L.el.style.opacity = ''; L.el.style.display = ''; });
  // 清除 year 装饰
  if(motion.yearMarker){ scene.remove(motion.yearMarker); motion.yearMarker.geometry.dispose(); motion.yearMarker.material.dispose(); motion.yearMarker = null; }
  if(motion.yearHighlight){ scene.remove(motion.yearHighlight); motion.yearHighlight.geometry.dispose(); motion.yearHighlight.material.dispose(); motion.yearHighlight = null; }
  // 清除 yao 脉冲
  motion.yaoPulses.forEach(p => { scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); });
  motion.yaoPulses = [];
  motion.yaoOwner = null;
  // 清除 enlighten / helix 轨迹
  if(motion.pathTube){ scene.remove(motion.pathTube); motion.pathTube.geometry.dispose(); motion.pathTube.material.dispose(); motion.pathTube = null; }
  if(motion.traveler){ scene.remove(motion.traveler); motion.traveler.geometry.dispose(); motion.traveler.material.dispose(); motion.traveler = null; }
  if(motion.travelerRing){ scene.remove(motion.travelerRing); motion.travelerRing.geometry.dispose(); motion.travelerRing.material.dispose(); motion.travelerRing = null; }
  motion.pathCurve = null;
  motion.travelerPrevNum = null;
  // 清除 flow
  if(motion.flow){ scene.remove(motion.flow); motion.flow.geometry.dispose(); motion.flow.material.dispose(); motion.flow.dispose && motion.flow.dispose(); motion.flow = null; }
  motion.flowEdges = null;
  motion.flowGroups = null;
  // 恢复可见性
  edgeGroup.visible = document.getElementById('tgLines').checked;
  monthGroup.visible = document.getElementById('tg12').checked;
}

function setMotionMode(mode){
  if(motion.mode === mode) return;
  resetMotion();
  motion.mode = mode;
  motion.tSwitch = performance.now()*0.001;
  motion.yearIdx = 0;
  motion.yearTNext = 0;
  if(mode === 'year'){
    motion.yearMarker = makeGlowSphere(0xffffff, 0.35);
    scene.add(motion.yearMarker);
    motion.yearHighlight = makeRing(0xffe17a, 0.9);
    scene.add(motion.yearHighlight);
    // 月令循环: 仅显示 12 消息卦(小球+标签), 隐藏其他卦+连线, 禁用景深
    const monthSet = new Set(MONTH_SEQ);
    sprites.forEach(s => { s.visible = monthSet.has(s.userData.num); });
    labels.forEach(L => {
      const show = monthSet.has(L.node.num);
      L.el.style.display = show ? '' : 'none';
      L.obj.visible = show;
    });
    edgeGroup.visible = false;
    monthGroup.visible = true;
  }
  if(mode === 'orbit'){
    // orbit 模式下隐藏变爻连线 / 月令线 (否则会断裂)
    edgeGroup.visible = false;
    monthGroup.visible = false;
  }
  if(mode === 'flow'){
    // 收集全部变爻边 (约 192 条)
    const edgeList = [];
    edgeGroup.children.forEach(line => {
      const a = numToNode[line.userData.a].pos;
      const b = numToNode[line.userData.b].pos;
      edgeList.push({
        a, b,
        u: Math.random(),                    // 起始位置 0~1
        speed: 0.25 + Math.random()*0.75     // 单位 /秒 (约 0.005~0.02 每帧 @60fps)
      });
    });
    // InstancedMesh 的金色粒子
    const sphereGeo = new THREE.SphereGeometry(0.12, 10, 8);
    const sphereMat = new THREE.MeshBasicMaterial({
      color: 0xffcc00,
      transparent: true, opacity: 1.0,
      blending: THREE.AdditiveBlending,
      depthWrite: false, depthTest: false
    });
    const inst = new THREE.InstancedMesh(sphereGeo, sphereMat, edgeList.length);
    inst.renderOrder = 1100;
    inst.frustumCulled = false;
    // 初始化矩阵
    const _m = new THREE.Matrix4();
    for(let i=0;i<edgeList.length;i++){
      const e = edgeList[i];
      const x = e.a.x + (e.b.x-e.a.x)*e.u;
      const y = e.a.y + (e.b.y-e.a.y)*e.u;
      const z = e.a.z + (e.b.z-e.a.z)*e.u;
      _m.makeTranslation(x,y,z);
      inst.setMatrixAt(i, _m);
    }
    inst.instanceMatrix.needsUpdate = true;
    scene.add(inst);
    motion.flow = inst;
    motion.flowEdges = edgeList;
    motion.flowLastT = performance.now()*0.001;
    // 按层级分组(用于呼吸): I..V = k=1..5 非轴; Axis = onAxis 或 k=0/6
    motion.flowGroups = { 1:[], 2:[], 3:[], 4:[], 5:[], axis:[] };
    sprites.forEach(s => {
      const n = s.userData;
      if(n.onAxis || n.k===0 || n.k===6) motion.flowGroups.axis.push(s);
      else if(n.k>=1 && n.k<=5) motion.flowGroups[n.k].push(s);
    });
  }
  if(mode === 'enlighten' || mode === 'helix'){
    const pts = (mode === 'enlighten') ? buildEnlightenWaypoints() : buildHelixWaypoints();
    motion.pathCurve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.3);
    const col = (mode === 'enlighten') ? 0xffd24a : 0x7fd8ff;
    motion.pathTube = makePathTube(motion.pathCurve, col);
    scene.add(motion.pathTube);
    motion.traveler = makeGlowSphere(0xffffff, 0.45);
    scene.add(motion.traveler);
    motion.travelerRing = makeRing(col, 0.95);
    scene.add(motion.travelerRing);
    // 暗化所有卦 sprite 作为背景
    sprites.forEach(s => { s.material.opacity = 0.5; });
  }
}

function updateYaoPulsesForHover(){
  // 基于 currentHover 重建脉冲
  const hov = currentHover;
  const ownerNum = hov ? hov.num : null;
  if(ownerNum === motion.yaoOwner) return;
  // 清除旧
  motion.yaoPulses.forEach(p => { scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); });
  motion.yaoPulses = [];
  motion.yaoOwner = ownerNum;
  if(!hov) return;
  const nbs = neighborsOf(hov);
  nbs.forEach((m,i)=>{
    if(!m) return;
    const mesh = makeGlowSphere(0xffaa00, 0.22);
    scene.add(mesh);
    motion.yaoPulses.push({ mesh, a: hov.pos.clone(), b: m.pos.clone(), phase: i/6 });
  });
}

function updateMotion(now){
  const t = now - motion.tSwitch;
  if(motion.mode === 'year'){
    // 每 3 秒切换当月 -> 12 月一周期 = 36 秒
    if(now >= motion.yearTNext){
      motion.yearIdx = (motion.yearIdx+1) % 12;
      motion.yearTNext = now + 3.0;
      // 月令卦强度重置 (非月令已隐藏)
      sprites.forEach(s => { if(s.visible){ s.scale.setScalar(s.userData._baseScale); s.material.opacity = 0.7; } });
      // 高亮当前月份卦
      const cur = numToNode[MONTH_SEQ[motion.yearIdx]];
      sprites.forEach(s => {
        if(s.userData.num === cur.num){ s.scale.setScalar(s.userData._baseScale*2.2); s.material.opacity = 1.0; }
      });
    }
    // 流光沿月令线匀速连续运动 (36 秒 / 圈 -> 每 3 秒经过一个月令卦)
    const pos = monthCurveRef.getPointAt((now/36) % 1);
    motion.yearMarker.position.copy(pos);
    // 金色高亮环实时跟随月令球 (与 yearMarker 完全同步, 无延迟)
    motion.yearHighlight.position.copy(pos);
    motion.yearHighlight.lookAt(0,0,0);
    const hr = 0.85 + 0.2*Math.sin(now*4);
    motion.yearHighlight.scale.setScalar(hr);
  }
  else if(motion.mode === 'yao'){
    updateYaoPulsesForHover();
    motion.yaoPulses.forEach(p => {
      const u = ((now*0.6 + p.phase) % 1);
      p.mesh.position.lerpVectors(p.a, p.b, u);
      p.mesh.material.opacity = 0.4 + 0.6*Math.sin(u*Math.PI);
    });
  }
  else if(motion.mode === 'flow'){
    if(motion.flow && motion.flowEdges){
      const dt = Math.min(0.05, now - (motion.flowLastT || now));
      motion.flowLastT = now;
      const edges = motion.flowEdges;
      const _m4 = _flowMat4;
      const inst = motion.flow;
      for(let i=0;i<edges.length;i++){
        const e = edges[i];
        e.u += e.speed * dt;
        if(e.u >= 1) e.u -= 1;
        const x = e.a.x + (e.b.x - e.a.x)*e.u;
        const y = e.a.y + (e.b.y - e.a.y)*e.u;
        const z = e.a.z + (e.b.z - e.a.z)*e.u;
        _m4.makeTranslation(x,y,z);
        inst.setMatrixAt(i, _m4);
      }
      inst.instanceMatrix.needsUpdate = true;
      // 6 层错相呼吸 (0.85~1.0), 周期 2.5s
      const period = 2.5;
      const omega = Math.PI*2 / period;
      const phases = { 1:0, 2:Math.PI/3, 3:2*Math.PI/3, 4:Math.PI, 5:4*Math.PI/3, axis:5*Math.PI/3 };
      for(const key in motion.flowGroups){
        const arr = motion.flowGroups[key];
        const phase = phases[key] || 0;
        const br = 0.925 + 0.075*Math.sin(now*omega + phase); // 0.85~1.0
        for(const s of arr){
          s.scale.setScalar(s.userData._baseScale * br);
        }
      }
    }
  }
  else if(motion.mode === 'enlighten' || motion.mode === 'helix'){
    if(motion.pathCurve){
      const period = (motion.mode === 'enlighten') ? 40 : 22; // 秒 (enlighten 较长)
      const u = (t / period) % 1;
      const pos = motion.pathCurve.getPointAt(u);
      motion.traveler.position.copy(pos);
      motion.travelerRing.position.copy(pos);
      motion.travelerRing.lookAt(0,0,0);
      const pulse = 0.85 + 0.25*Math.sin(now*5);
      motion.travelerRing.scale.setScalar(pulse);
      // 找到最近的卦并高亮 (仅 enlighten 模式)
      if(motion.mode === 'enlighten'){
        let best=null, bestD=Infinity;
        for(const n of nodes){
          const d = n.pos.distanceTo(pos);
          if(d<bestD){ bestD = d; best = n; }
        }
        if(best && best.num !== motion.travelerPrevNum){
          // 恢复之前高亮
          sprites.forEach(s => { s.scale.setScalar(s.userData._baseScale); s.material.opacity = 0.5; });
          // 高亮当前
          sprites.forEach(s => {
            if(s.userData.num === best.num){ s.scale.setScalar(s.userData._baseScale*2.2); s.material.opacity = 1.0; }
          });
          motion.travelerPrevNum = best.num;
        }
      }
    }
  }
  else if(motion.mode === 'orbit'){
    // 7 个 k 层 (0~6) 差速自转
    const speeds = [0.10, 0.14, 0.18, 0.22, 0.18, 0.14, 0.10]; // rad/sec
    sprites.forEach(s => {
      const n = s.userData;
      const a = speeds[n.k] * t;
      const ca = Math.cos(a), sa = Math.sin(a);
      const o = n._orig;
      s.position.set(o.x*ca - o.z*sa, o.y, o.x*sa + o.z*ca);
    });
    labels.forEach(L => {
      const a = speeds[L.node.k] * t;
      const ca = Math.cos(a), sa = Math.sin(a);
      const o = L._orig;
      L.obj.position.set(o.x*ca - o.z*sa, o.y, o.x*sa + o.z*ca);
    });
  }
}

function updateMonthSegments(){
  if(!monthSegments || !monthSegments.length || !monthMats) return;
  const frontOnly = document.getElementById('tgFront') && document.getElementById('tgFront').checked;
  const cd = _camDir;
  for(const seg of monthSegments){
    if(!frontOnly){
      // 非主视图模式: 全段统一亮金实线 + 光晕 (恢复原样)
      seg.core.material = monthMats.matFrontCore;
      seg.core.visible = true;
      seg.halo.material = monthMats.matFrontHalo;
      seg.halo.visible = true;
      continue;
    }
    const front = seg.mid.dot(cd) > 0;
    if(front){
      seg.core.material = monthMats.matFrontCore;
      seg.core.visible = true;
      seg.halo.material = monthMats.matFrontHalo;
      seg.halo.visible = true;
    } else {
      seg.core.material = monthMats.matBackCore;
      seg.core.visible = (seg.idx % 2 === 0); // 虚线: 每 2 段隐藏 1 段
      seg.halo.visible = false;
    }
  }
}

}

/* ===================== 顶部卦象搜索 ===================== */
(function setupHexSearch(){
  const input = document.querySelector('#hexSearch .hs-input');
  const list  = document.querySelector('#hexSearch .hs-list');
  if(!input || !list) return;

  // 八卦英文别名, 支持 "fire/water/thunder/wind..." 模糊搜索
  const TRIG_ALIAS = {
    '乾':['qian','heaven','sky'], '坤':['kun','earth','ground'],
    '震':['zhen','thunder'],      '巽':['xun','wind'],
    '坎':['kan','water'],         '离':['li','fire'],
    '艮':['gen','mountain'],      '兑':['dui','lake','marsh']
  };
  const ELEM_ALIAS = {
    '天':['heaven','sky'], '地':['earth','ground'],
    '雷':['thunder'],      '风':['wind'],
    '水':['water'],        '火':['fire'],
    '山':['mountain'],     '泽':['lake','marsh']
  };
  // 构建索引: 名称 / 编号 / 上下卦名 / 上下卦卦象元素 + 英文别名 + 可单独比对的上/下卦字段
  const index = nodes.map(n => {
    const upBits = n.bits.slice(0,3), loBits = n.bits.slice(3,6);
    const up = TRIGRAM[upBits] || ['',''];
    const lo = TRIGRAM[loBits] || ['',''];
    const upAliases = [up[0], up[1], ...(TRIG_ALIAS[up[0]]||[]), ...(ELEM_ALIAS[up[1]]||[])];
    const loAliases = [lo[0], lo[1], ...(TRIG_ALIAS[lo[0]]||[]), ...(ELEM_ALIAS[lo[1]]||[])];
    const upKey = upAliases.join(' ').toLowerCase();
    const loKey = loAliases.join(' ').toLowerCase();
    const key = [
      n.name,
      String(n.num),
      HEX_SYMBOL[n.num] || '',
      upKey, loKey,
      up[0]+lo[0], up[1]+lo[1],
      up[0]+'下'+lo[0],
      MONTH_MAP[n.num] || ''
    ].join(' ').toLowerCase();
    return {
      node: n,
      key, upKey, loKey,
      up:up[0], upEl:up[1], lo:lo[0], loEl:lo[1]
    };
  });

  function match(q){
    q = q.trim().toLowerCase();
    if(!q) return [];
    // 纯数字 -> 包含该数字串的所有卦 (覆盖 01-64 全部, 不截断)
    if(/^\d+$/.test(q)){
      const exact   = [];
      const prefix  = [];
      const contain = [];
      for(const it of index){
        const s  = String(it.node.num);
        const s2 = s.padStart(2, '0');
        if(s === q) exact.push(it);
        else if(s.startsWith(q) || s2.startsWith(q)) prefix.push(it);
        else if(s.includes(q)   || s2.includes(q))   contain.push(it);
      }
      const order = (a,b) => a.node.num - b.node.num;
      exact.sort(order); prefix.sort(order); contain.sort(order);
      return [...exact, ...prefix, ...contain];
    }
    // 文字模糊: 遍历全部 64 卦, 在 名称 / 上卦 / 下卦 / 整体 key 中查找
    // 评分越低越靠前; 保证上卦或下卦包含关键字的卦象全部被命中
    const hits = [];
    for(const it of index){
      const n = it.node;
      const nameHit = n.name.toLowerCase().includes(q);
      const upHit   = it.upKey.includes(q);
      const loHit   = it.loKey.includes(q);
      const keyHit  = it.key.includes(q);
      if(!(nameHit || upHit || loHit || keyHit)) continue;
      let score = 10;
      if(n.name === q) score = 0;             // 卦名精确
      else if(n.name.startsWith(q)) score = 1; // 卦名前缀
      else if(nameHit) score = 2;              // 卦名包含
      else if(upHit && loHit) score = 3;       // 上下卦皆含
      else if(upHit) score = 4;                // 上卦含
      else if(loHit) score = 5;                // 下卦含
      else if(keyHit) score = 6;
      hits.push({it, score});
    }
    hits.sort((a,b)=> a.score - b.score || a.it.node.num - b.it.node.num);
    return hits.map(h => h.it);
  }

  let selIdx = 0, current = [];

  function render(){
    list.innerHTML = '';
    if(!current.length){ list.classList.remove('on'); return; }
    list.classList.add('on');
    current.forEach((it, i) => {
      const n = it.node;
      const row = document.createElement('div');
      row.className = 'hs-item' + (i === selIdx ? ' sel' : '');
      row.dataset.idx = i;
      row.innerHTML = `
        <span class="hs-sym">${HEX_SYMBOL[n.num]||''}</span>
        <span class="hs-num">${String(n.num).padStart(2,'0')}</span>
        <span class="hs-name">${n.name}</span>
        <span class="hs-meta">${it.up}${it.upEl}上 ${it.lo}${it.loEl}下</span>
      `;
      list.appendChild(row);
    });
  }
  // 事件委托到 list, 避免 innerHTML 重建导致子元素监听器丢失
  function updateSelClass(){
    list.querySelectorAll('.hs-item').forEach((el, i) => {
      el.classList.toggle('sel', i === selIdx);
    });
  }
  list.addEventListener('mousemove', e => {
    const row = e.target.closest('.hs-item');
    if(!row) return;
    const i = +row.dataset.idx;
    if(i !== selIdx){ selIdx = i; updateSelClass(); }
  });
  // mousedown 抢在 input blur 前触发, 保证点击定位必然生效
  list.addEventListener('mousedown', e => {
    const row = e.target.closest('.hs-item');
    if(!row) return;
    e.preventDefault();
    pick(+row.dataset.idx);
  });
  // click 兜底 (移动端/触摸)
  list.addEventListener('click', e => {
    const row = e.target.closest('.hs-item');
    if(!row) return;
    e.preventDefault();
    pick(+row.dataset.idx);
  });

  // 平滑相机飞行: slerp 球面方向 + 线性缩放距离, 使目标旋转到正前方
  function flyToNode(node){
    const startDir = camera.position.clone().normalize();
    const endDir   = node.pos.clone().normalize();
    const startLen = camera.position.length();
    const endLen   = Math.max(18, Math.min(startLen, 28));
    const dot = THREE.MathUtils.clamp(startDir.dot(endDir), -1, 1);
    const omega = Math.acos(dot);
    const sinO  = Math.sin(omega);
    const tgt   = controls.target.clone();
    const startTgt = tgt.clone();
    const t0 = performance.now();
    const dur = 900;
    function ease(x){ return x<0.5 ? 2*x*x : 1 - Math.pow(-2*x+2,2)/2; }
    (function step(){
      const t = Math.min(1, (performance.now() - t0) / dur);
      const e = ease(t);
      let dir;
      if(sinO < 1e-4){
        dir = endDir.clone();
      } else {
        const a = Math.sin((1-e)*omega)/sinO;
        const b = Math.sin(e*omega)/sinO;
        dir = startDir.clone().multiplyScalar(a).add(endDir.clone().multiplyScalar(b));
      }
      const len = startLen + (endLen - startLen) * e;
      camera.position.copy(dir.multiplyScalar(len));
      controls.target.lerpVectors(startTgt, new THREE.Vector3(0,0,0), e);
      if(t < 1) requestAnimationFrame(step);
    })();
  }

  function pick(i){
    const it = current[i];
    if(!it) return;
    const n = it.node;
    flyToNode(n);
    // 使用已有 highlight + setHotLabel 叠加标记
    try { highlight(n); } catch(_){}
    try { setHotLabel(n); } catch(_){}
    try { if(window.showHexImage) window.showHexImage(n); } catch(_){}
    // sprite 短暂放大做脉冲
    const sp = sprites.find(s => s.userData && s.userData.num === n.num);
    if(sp){
      const base = sp.userData._baseScale || sp.scale.x;
      sp.userData._baseScale = base;
      const t0 = performance.now();
      (function pulse(){
        const t = (performance.now() - t0) / 900;
        if(t >= 1){ sp.scale.setScalar(base); return; }
        const k = 1 + 0.6 * Math.sin(t * Math.PI);
        sp.scale.setScalar(base * k);
        requestAnimationFrame(pulse);
      })();
    }
    list.classList.remove('on');
    input.blur();
  }

  input.addEventListener('input', e => {
    current = match(e.target.value);
    selIdx = 0;
    render();
  });
  input.addEventListener('focus', e => {
    if(current.length) list.classList.add('on');
  });
  input.addEventListener('keydown', e => {
    if(!current.length) return;
    if(e.key === 'ArrowDown'){ selIdx = (selIdx+1) % current.length; render(); e.preventDefault(); }
    else if(e.key === 'ArrowUp'){ selIdx = (selIdx-1+current.length) % current.length; render(); e.preventDefault(); }
    else if(e.key === 'Enter'){ pick(selIdx); e.preventDefault(); }
    else if(e.key === 'Escape'){ list.classList.remove('on'); input.blur(); }
  });
  document.addEventListener('click', e => {
    if(!e.target.closest('#hexSearch')) list.classList.remove('on');
  });
})();

    flow: {
      name: '爻变总流(全局)',
      principle: '全部 192 条变爻边同时启动光流, 沿边方向无差别流动, 呈现整个变爻网络的脉络。',
      impl: '为每条边创建独立的光点, 每帧 t += dv, 当 t>1 重置, 沿 LineCurve3 移动 PointSprite。',
      usage: '宏观把握"任何卦都可以一爻之差转化为另一卦"的整体性, 像神经网络放电图。'
    }
  };

  const root = document.getElementById('modeInfo');
  const panel = root.querySelector('.mi-panel');
  const head = root.querySelector('.mi-head');
  const toggleBtn = root.querySelector('.mi-toggle');
  const closeBtn = root.querySelector('.mi-close');
  const elMode = document.getElementById('miMode');
  const elPrin = document.getElementById('miPrinciple');
  const elImpl = document.getElementById('miImpl');
  const elUsage = document.getElementById('miUsage');

  // === 状态恢复 ===
  const LS_KEY = 'yiglobe.modeInfo';
  let state = { x: null, y: null, expanded: false };
  try { Object.assign(state, JSON.parse(localStorage.getItem(LS_KEY) || '{}')); } catch(_){}
  function anchorTopRight(){
    root.style.left = '';
    root.style.top = '18px';
    root.style.right = '18px';
  }
  function applySavedPos(){
    if(state.x !== null && state.y !== null){
      root.style.left = state.x + 'px';
      root.style.top = state.y + 'px';
      root.style.right = 'auto';
    } else { anchorTopRight(); }
  }
  // 收起时强制锁定右上角; 展开后才使用已保存位置
  if(state.expanded){ root.classList.add('expanded'); applySavedPos(); }
  else { anchorTopRight(); }
  const persist = () => { try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(_){} };

  // === 内容刷新 ===
  function showMode(m){
    const d = MODE_DOC[m] || MODE_DOC.off;
    elMode.textContent = '【' + d.name + '】';
    elPrin.textContent = d.principle;
    elImpl.textContent = d.impl;
    elUsage.textContent = d.usage;
  }
  // 初始: 当前已选中的模式
  const initSel = document.querySelector('input[name="motion"]:checked');
  if(initSel) showMode(initSel.value);

  // === 单选切换 -> 自动展开并刷新 ===
  document.querySelectorAll('input[name="motion"]').forEach(r => {
    r.addEventListener('change', e => {
      showMode(e.target.value);
      root.classList.add('expanded');
      state.expanded = true;
      persist();
    });
  });

  // === 展开/收起 ===
  toggleBtn.addEventListener('click', () => {
    applySavedPos();
    root.classList.add('expanded');
    state.expanded = true; persist();
  });
  closeBtn.addEventListener('click', () => {
    root.classList.remove('expanded');
    state.expanded = false;
    anchorTopRight(); // 收起后按钮回到右上角
    persist();
  });

  // === 关闭按钮: 阻止拖拽 pointerdown 抢占事件 ===
  ['pointerdown','mousedown','click'].forEach(ev => {
    closeBtn.addEventListener(ev, e => { e.stopPropagation(); });
  });

  // === 拖拽 ===
  let dragging = false, dx = 0, dy = 0;
  head.addEventListener('pointerdown', e => {
    if(e.target.closest('.mi-close')) return; // 点关闭按钮时不进入拖拽
    dragging = true;
    const r = root.getBoundingClientRect();
    dx = e.clientX - r.left;
    dy = e.clientY - r.top;
    head.setPointerCapture(e.pointerId);
  });
  head.addEventListener('pointermove', e => {
    if(!dragging) return;
    const x = Math.max(0, Math.min(window.innerWidth - 60, e.clientX - dx));
    const y = Math.max(0, Math.min(window.innerHeight - 40, e.clientY - dy));
    root.style.left = x + 'px';
    root.style.top  = y + 'px';
    root.style.right = 'auto';
    state.x = x; state.y = y;
  });
  head.addEventListener('pointerup', e => {
    dragging = false;
    head.releasePointerCapture(e.pointerId);
    persist();
  });
})();
</script>
<script src="hexdetail.js"></script>
</body>
</html>
